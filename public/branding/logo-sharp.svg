<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    Bar Thickness (t) = 20
    Gap (g) = 10 (50% of t)
    Total Height = 20 + 10 + 20 = 50
    Centered vertically: Top at 25.
  -->
  <rect x="10" y="25" width="80" height="20" fill="#2c3e50" />
  <rect x="10" y="55" width="80" height="20" fill="#2c3e50" />
</svg>
